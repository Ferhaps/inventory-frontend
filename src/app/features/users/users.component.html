<div class="users mx-4 h-[90%]">
  <div class="flex items-center title-row gap-4">
    <h1 class="text-2xl font-bold">Users</h1>
    @if (loggedUser.user.role === 'ADMIN') {
      <div class="!text-[#009DDC] cursor-pointer font-medium" (click)="openRegisterUserPopup()">+ add</div>
    }
  </div>

  <div class="overflow-y-auto min-h-[370px] mat-elevation-z5" tabindex="0">
    <table mat-table [dataSource]="users()">
      <ng-container matColumnDef="email" sticky>
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{user.email}}</td>
      </ng-container>

      <ng-container matColumnDef="role" sticky>
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">{{user.role}}</td>
      </ng-container>

      <ng-container matColumnDef="actions" sticky>
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button class="cursor-pointer dots ml-auto" [matMenuTriggerFor]="optionsMenu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #optionsMenu="matMenu">
            @for (action of user.actions; track $index) {
              <div mat-menu-item (click)="selectOption(user, action)" class="font-medium"
                [style.color]="action == 'Delete' ? '#ff0000' : null">
                {{action}}
              </div>
            }
          </mat-menu>
        </td>
      </ng-container>
    
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
