<div class="dashboard flex flex-col h-full overflow-hidden p-4">

	<!-- Stat Cards -->
	<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4 shrink-0">
		<div class="stat-card mat-elevation-z2 p-5 rounded-xl flex items-center gap-4">
			<div class="stat-icon bg-blue-100 text-blue-500 rounded-full p-3">
				<mat-icon>inventory_2</mat-icon>
			</div>
			<div>
				<div class="text-3xl font-bold">{{ totalProducts() }}</div>
				<div class="stat-label text-sm mt-0.5">Total Products</div>
			</div>
		</div>

		<div class="stat-card mat-elevation-z2 p-5 rounded-xl flex items-center gap-4">
			<div class="stat-icon bg-purple-100 text-purple-500 rounded-full p-3">
				<mat-icon>category</mat-icon>
			</div>
			<div>
				<div class="text-3xl font-bold">{{ totalCategories() }}</div>
				<div class="stat-label text-sm mt-0.5">Categories</div>
			</div>
		</div>

		<div class="stat-card mat-elevation-z2 p-5 rounded-xl flex items-center gap-4">
			<div class="stat-icon bg-green-100 text-green-600 rounded-full p-3">
				<mat-icon>people</mat-icon>
			</div>
			<div>
				<div class="text-3xl font-bold">{{ totalUsers() }}</div>
				<div class="stat-label text-sm mt-0.5">Users</div>
			</div>
		</div>

		<div class="stat-card mat-elevation-z2 p-5 rounded-xl flex items-center gap-4"
			[class.low-stock-alert]="lowStockCount() > 0">
			<div class="stat-icon rounded-full p-3"
				[class.bg-red-100]="lowStockCount() > 0"
				[class.text-red-500]="lowStockCount() > 0"
				[class.bg-gray-100]="lowStockCount() === 0"
				[class.text-gray-400]="lowStockCount() === 0">
				<mat-icon>warning</mat-icon>
			</div>
			<div>
				<div class="text-3xl font-bold" [class.text-red-500]="lowStockCount() > 0">
					{{ lowStockCount() }}
				</div>
				<div class="stat-label text-sm mt-0.5">Low Stock Items</div>
			</div>
		</div>
	</div>

	@if (isLoaded()) {
		<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 flex-1 min-h-0">
			<div class="panel mat-elevation-z2 p-5 rounded-xl flex flex-col overflow-hidden">
				<h2 class="text-lg font-semibold mb-4 shrink-0">Products by Category</h2>
				@if (totalProducts() > 0) {
					<div class="chart-container flex-1 min-h-0">
						<canvas #chartCanvas></canvas>
					</div>
				} @else {
					<div class="empty-state">No products found.</div>
				}
			</div>

			<div class="panel mat-elevation-z2 p-5 rounded-xl flex flex-col overflow-hidden">
				<h2 class="text-lg font-semibold mb-3 shrink-0">Recent Activity</h2>
				<app-activity-feed class="flex-1 min-h-0" [logs]="recentLogs()" />
			</div>
		</div>
	}
</div>
